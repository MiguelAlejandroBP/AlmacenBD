<section class="animate-fade-in">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem;">
        <div>
            <h1 style="margin: 0;">Gestión de Usuarios</h1>
            <p style="color: var(--secondary-color); font-size: 0.95rem;">Administre los niveles de acceso y perfiles del sistema.</p>
        </div>
        <button class="btn btn-primary" id="btn-open-user-modal" style="padding: 0 1.5rem;">+ Registrar Nuevo Usuario</button>
    </div>

    <div class="card" style="padding: 0; overflow: hidden; border: none; box-shadow: var(--shadow);">
        <div style="width: 100%; overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem;">
                <thead style="background: #f8fafc; border-bottom: 1px solid var(--border-color);">
                    <tr>
                        <th style="padding: 1.2rem 1.5rem; color: var(--text-main); font-weight: 700;">Usuario / Email</th>
                        <th style="padding: 1.2rem 1.5rem; color: var(--text-main); font-weight: 700;">Rol asignado</th>
                        <th style="padding: 1.2rem 1.5rem; color: var(--text-main); font-weight: 700;">Estado de cuenta</th>
                        <th style="padding: 1.2rem 1.5rem; color: var(--text-main); font-weight: 700; text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <!-- Se llena dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal para Registrar Usuario -->
    <div id="user-modal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(5, 46, 22, 0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center;">
        <div class="card" style="width: 90%; max-width: 450px; position: relative; padding: 2.5rem; border-radius: var(--border-radius-lg);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="margin: 0; color: var(--text-main);">Nuevo Usuario</h2>
                <button id="btn-close-user-modal" style="background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center;">&times;</button>
            </div>
            
            <form id="user-registration-form">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.6rem; font-weight: 600; font-size: 0.9rem; color: var(--text-main);">Correo Electrónico</label>
                    <input type="email" id="u-email" required placeholder="ejemplo@utrng.edu.mx" 
                        style="width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: var(--border-radius-md); background: #f9fafb; outline: none; transition: border-color 0.2s;"
                        onfocus="this.style.borderColor='var(--primary-color)'"
                        onblur="this.style.borderColor='var(--border-color)'">
                </div>
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; margin-bottom: 0.6rem; font-weight: 600; font-size: 0.9rem; color: var(--text-main);">Contraseña Temporal</label>
                    <input type="password" id="u-password" required minlength="6" placeholder="••••••••"
                        style="width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: var(--border-radius-md); background: #f9fafb; outline: none; transition: border-color 0.2s;"
                        onfocus="this.style.borderColor='var(--primary-color)'"
                        onblur="this.style.borderColor='var(--border-color)'">
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">Mínimo 6 caracteres. El usuario deberá cambiarla al ingresar.</p>
                </div>
                
                <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                    <button type="button" id="btn-cancel-user" class="btn" style="background-color: #f1f5f9; color: #475569; padding: 0.8rem 1.5rem; border-radius: var(--border-radius-md);">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="padding: 0.8rem 2rem;">Registrar Acceso</button>
                </div>
            </form>
        </div>
    </div>
</section>
