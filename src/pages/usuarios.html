<section class="animate-fade-in"
         style="
            padding: 2rem;
            font-family: 'Segoe UI', sans-serif;
">

    <!-- Encabezado -->
    <div style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2.5rem;
        flex-wrap: wrap;
        gap: 1rem;
    ">

        <div>

            <h1 style="margin: 0; font-size: 2rem; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.25); color: white;">
                Gestión de Usuarios
            </h1>

            <p style="font-size: 0.95rem; margin-top: 0.4rem; color: white;">
                Administre los niveles de acceso y perfiles del sistema.
            </p>

        </div>

        <!-- Botón -->
        <button 
            class="btn btn-primary"
            id="btn-open-user-modal"

            style="
                padding: 0.9rem 1.7rem;
                border: none;
                border-radius: 14px;
                background: linear-gradient(135deg, #f59e0b, #d97706);
                color: white;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.25s ease;
                box-shadow: 0 10px 20px rgba(245,158,11,0.28);
            "

            onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 14px 24px rgba(245,158,11,0.38)'"
            onmouseout="this.style.transform='translateY(0px)'; this.style.boxShadow='0 10px 20px rgba(245,158,11,0.28)'"
        >
            + Registrar Nuevo Usuario
        </button>

    </div>

    <!-- Tabla -->
    <div class="card"

         style="
            padding: 0;
            overflow: hidden;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            background: var(--surface-color);
            box-shadow: var(--shadow);
    ">

        <div style="
            width: 100%;
            overflow-x: auto;
        ">

            <table style="
                width: 100%;
                border-collapse: collapse;
                text-align: left;
                font-size: 0.95rem;
            ">

                <!-- Encabezado -->
                <thead style="
                    background: var(--bg-color);
                    border-bottom: 1px solid var(--border-color);
                ">

                    <tr>

                        <th style="
                            padding: 1.2rem 1.5rem;
                            color: var(--text-main);
                            font-weight: 700;
                        ">
                            Usuario / Email
                        </th>

                        <th style="
                            padding: 1.2rem 1.5rem;
                            color: var(--text-main);
                            font-weight: 700;
                        ">
                            Rol asignado
                        </th>

                        <th style="
                            padding: 1.2rem 1.5rem;
                            color: var(--text-main);
                            font-weight: 700;
                        ">
                            Estado de cuenta
                        </th>

                        <th style="
                            padding: 1.2rem 1.5rem;
                            color: var(--text-main);
                            font-weight: 700;
                            text-align: right;
                        ">
                            Acciones
                        </th>

                    </tr>

                </thead>

                <!-- Contenido -->
                <tbody id="users-table-body"

                       style="
                            color: var(--text-main);
                            background: var(--surface-color);
                ">

                    <!-- Se llena dinámicamente -->

                </tbody>

            </table>

        </div>

    </div>

    <!-- Modal -->
    <div id="user-modal"
         class="modal"

         style="
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 46, 22, 0.8);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
    ">

        <!-- Card Modal -->
        <div class="card"

             style="
                width: 90%;
                max-width: 480px;
                position: relative;
                padding: 2.7rem;
                border-radius: 28px;
                background: var(--surface-color);
                box-shadow: 0 25px 50px rgba(0,0,0,0.4);
                border: 1px solid var(--border-color);
        ">

            <!-- Header -->
            <div style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 2rem;
            ">

                <div>

                    <h2 style="
                        margin: 0;
                        color: var(--text-main);
                        font-size: 1.7rem;
                        font-weight: 700;
                    ">
                        Nuevo Usuario
                    </h2>

                    <p style="
                        margin-top: 0.35rem;
                        color: var(--text-muted);
                        font-size: 0.88rem;
                    ">
                        Cree nuevas credenciales de acceso
                    </p>

                </div>

                <!-- Cerrar -->
                <button id="btn-close-user-modal"

                        style="
                            background: var(--bg-color);
                            border: none;
                            width: 40px;
                            height: 40px;
                            border-radius: 50%;
                            font-size: 1.5rem;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            color: var(--text-main);
                            transition: all 0.2s ease;
                    "

                    onmouseover="this.style.background='var(--border-color)'"
                    onmouseout="this.style.background='var(--bg-color)'"
                >
                    &times;
                </button>

            </div>

            <!-- Formulario -->
            <form id="user-registration-form">

                <!-- Email -->
                <div style="margin-bottom: 1.5rem;">

                    <label style="
                        display: block;
                        margin-bottom: 0.6rem;
                        font-weight: 700;
                        font-size: 0.9rem;
                        color: var(--text-main);
                    ">
                        Correo Electrónico
                    </label>

                    <input 
                        type="email"
                        id="u-email"
                        required
                        placeholder="ejemplo@utrng.edu.mx"

                        style="
                            width: 100%;
                            padding: 0.9rem 1rem;
                            border: 1px solid var(--border-color);
                            border-radius: 14px;
                            background: var(--bg-color);
                            outline: none;
                            transition: all 0.25s ease;
                            color: white;
                            font-size: 0.95rem;
                            box-sizing: border-box;
                        "

                        onfocus="this.style.borderColor='var(--primary-color)'; this.style.boxShadow='0 0 0 4px rgba(34,197,94,0.15)'"
                        onblur="this.style.borderColor='var(--border-color)'; this.style.boxShadow='none'"
                    >

                </div>

                <!-- Rol -->
                <div style="margin-bottom: 1.5rem;">
                    <label style="
                        display: block;
                        margin-bottom: 0.6rem;
                        font-weight: 700;
                        font-size: 0.9rem;
                        color: var(--text-main);
                    ">
                        Rol asignado
                    </label>
                    <select 
                        id="u-rol"
                        required
                        style="
                            width: 100%;
                            padding: 0.9rem 1rem;
                            border: 1px solid var(--border-color);
                            border-radius: 14px;
                            background: var(--bg-color);
                            outline: none;
                            transition: all 0.25s ease;
                            color: white;
                            font-size: 0.95rem;
                            box-sizing: border-box;
                        "
                        onfocus="this.style.borderColor='var(--primary-color)'; this.style.boxShadow='0 0 0 4px rgba(34,197,94,0.15)'"
                        onblur="this.style.borderColor='var(--border-color)'; this.style.boxShadow='none'"
                    >
                        <option value="Usuario Estándar">Usuario Estándar</option>
                        <option value="Administrador">Administrador</option>
                        <option value="Supervisor">Supervisor</option>
                        <option value="Administrador Maestro">Administrador Maestro</option>
                    </select>
                </div>

                <!-- Password -->
                <div id="password-field-container" style="margin-bottom: 2rem;">

                    <label style="
                        display: block;
                        margin-bottom: 0.6rem;
                        font-weight: 700;
                        font-size: 0.9rem;
                        color: var(--text-main);
                    ">
                        Contraseña Temporal
                    </label>

                    <input 
                        type="password"
                        id="u-password"
                        required
                        minlength="6"
                        placeholder="••••••••"

                        style="
                            width: 100%;
                            padding: 0.9rem 1rem;
                            border: 1px solid var(--border-color);
                            border-radius: 14px;
                            background: var(--bg-color);
                            outline: none;
                            transition: all 0.25s ease;
                            color: white;
                            font-size: 0.95rem;
                            box-sizing: border-box;
                        "

                        onfocus="this.style.borderColor='var(--primary-color)'; this.style.boxShadow='0 0 0 4px rgba(34,197,94,0.15)'"
                        onblur="this.style.borderColor='var(--border-color)'; this.style.boxShadow='none'"
                    >

                    <p style="
                        font-size: 0.76rem;
                        color: var(--text-muted);
                        margin-top: 0.6rem;
                    ">
                        Mínimo 6 caracteres. El usuario deberá cambiarla al ingresar.
                    </p>

                </div>

                <!-- Hidden ID field for editing -->
                <input type="hidden" id="u-id">

                <!-- Botones -->
                <div style="
                    display: flex;
                    justify-content: flex-end;
                    gap: 1rem;
                ">

                    <!-- Cancelar -->
                    <button 
                        type="button"
                        id="btn-cancel-user"
                        class="btn"

                        style="
                            background: var(--bg-color);
                            color: var(--text-main);
                            padding: 0.9rem 1.5rem;
                            border: none;
                            border-radius: 14px;
                            font-weight: 600;
                            cursor: pointer;
                            transition: all 0.2s ease;
                        "

                        onmouseover="this.style.background='var(--border-color)'"
                        onmouseout="this.style.background='var(--bg-color)'"
                    >
                        Cancelar
                    </button>

                    <!-- Registrar -->
                    <button 
                        type="submit"
                        class="btn btn-primary"

                        style="
                            padding: 0.9rem 2rem;
                            border: none;
                            border-radius: 14px;
                            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
                            color: white;
                            font-weight: 700;
                            cursor: pointer;
                            transition: all 0.25s ease;
                            box-shadow: 0 10px 20px rgba(34,197,94,0.25);
                        "

                        onmouseover="this.style.transform='translateY(-2px)'"
                        onmouseout="this.style.transform='translateY(0px)'"
                    >
                        Registrar Acceso
                    </button>

                </div>

            </form>

        </div>

    </div>

</section>
