<div class="login-container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%; background-color: var(--primary-color); position: fixed; top: 0; left: 0;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 2.5rem; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="color: var(--primary-color); font-size: 1.5rem; margin-bottom: 0.5rem;">AlmacénControl</h2>
            <p style="color: var(--secondary-color); font-size: 0.875rem;">Inicie sesión para continuar</p>
        </div>
        
        <form id="login-form">
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 600;">Correo Electrónico</label>
                <input type="email" required placeholder="correo@ejemplo.com" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 600;">Contraseña</label>
                <input type="password" required placeholder="••••••••" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.75rem; font-weight: 600;">Entrar al Sistema</button>
        </form>
        
        <div style="margin-top: 1.5rem; text-align: center;">
            <a href="#" style="color: var(--secondary-color); font-size: 0.75rem; text-decoration: none;">¿Olvidó su contraseña?</a>
        </div>
    </div>
</div>
