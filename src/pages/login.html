<div class="login-container" 
     style="
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        width: 100%;
        background: linear-gradient(135deg, var(--bg-color) 0%, #022c22 100%);
        position: fixed;
        top: 0;
        left: 0;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
">

    <!-- Efectos decorativos -->
    <div style="
        position: absolute;
        width: 500px;
        height: 500px;
        background: rgba(255,255,255,0.05);
        border-radius: 50%;
        top: -120px;
        right: -120px;
        filter: blur(12px);
    "></div>

    <div style="
        position: absolute;
        width: 350px;
        height: 350px;
        background: rgba(34,197,94,0.18);
        border-radius: 50%;
        bottom: -100px;
        left: -100px;
        filter: blur(18px);
    "></div>

    <!-- Card principal -->
    <div class="card" 
         style="
            width: 100%;
            max-width: 430px;
            padding: 3rem;
            background: var(--surface-color);
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            position: relative;
            border: 1px solid var(--border-color);
            z-index: 2;
    ">

        <!-- Encabezado -->
        <div style="text-align: center; margin-bottom: 2.3rem;">

            <!-- Logo -->
            <div style="
                width: 90px;
                height: 90px;
                margin: 0 auto 1.3rem auto;
                border-radius: 50%;
                background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 2rem;
                font-weight: bold;
                box-shadow: 0 12px 25px rgba(34,197,94,0.35);
            ">
                GDB
            </div>

            <h2 style="
                color: var(--text-main);
                font-size: 2rem;
                margin-bottom: 0.4rem;
                font-weight: 700;
            ">
                SISTEMA DE REGISTRO DE INVENTARIO
            </h2>

            <p style="
                color: var(--text-muted);
                font-size: 0.95rem;
            ">
                Inicie sesión para acceder al sistema
            </p>
        </div>

        <!-- Formulario -->
        <form id="login-form">

            <!-- Correo -->
            <div style="margin-bottom: 1.5rem;">

                <label style="
                    display: block;
                    margin-bottom: 0.55rem;
                    font-size: 0.9rem;
                    font-weight: 600;
                ">
                    Correo Electrónico
                </label>

                <input 
                    type="email"
                    required
                    placeholder="correo@ejemplo.com"

                    style="
                        width: 100%;
                        padding: 1rem;
                        border: 1px solid var(--border-color);
                        border-radius: 14px;
                        box-sizing: border-box;
                        background: var(--bg-color);
                        color: white;
                        font-size: 0.95rem;
                        transition: all 0.25s ease;
                        outline: none;
                    "

                    onfocus="this.style.borderColor='var(--primary-color)'; this.style.boxShadow='0 0 0 4px rgba(34,197,94,0.18)'"
                    onblur="this.style.borderColor='var(--border-color)'; this.style.boxShadow='none'"
                >
            </div>

            <!-- Contraseña -->
            <div style="margin-bottom: 2rem;">

                <label style="
                    display: block;
                    margin-bottom: 0.55rem;
                    font-size: 0.9rem;
                    font-weight: 600;
                ">
                    Contraseña
                </label>

                <input 
                    type="password"
                    required
                    placeholder="••••••••"

                    style="
                        width: 100%;
                        padding: 1rem;
                        border: 1px solid var(--border-color);
                        border-radius: 14px;
                        box-sizing: border-box;
                        background: var(--bg-color);
                        color: white;
                        font-size: 0.95rem;
                        transition: all 0.25s ease;
                        outline: none;
                    "

                    onfocus="this.style.borderColor='var(--primary-color)'; this.style.boxShadow='0 0 0 4px rgba(34,197,94,0.18)'"
                    onblur="this.style.borderColor='var(--border-color)'; this.style.boxShadow='none'"
                >
            </div>

            <!-- Botón -->
            <button 
                type="submit"
                class="btn btn-primary"

                style="
                    width: 100%;
                    padding: 1rem;
                    font-weight: 700;
                    font-size: 1rem;
                    border: none;
                    border-radius: 14px;
                    background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
                    color: white;
                    cursor: pointer;
                    transition: all 0.25s ease;
                    box-shadow: 0 10px 20px rgba(34,197,94,0.28);
                "

                onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 15px 28px rgba(34,197,94,0.38)'"
                onmouseout="this.style.transform='translateY(0px)'; this.style.boxShadow='0 10px 20px rgba(34,197,94,0.28)'"
            >
                Entrar al Sistema
            </button>

        </form>

        <!-- Footer -->
        <div style="
            margin-top: 1.8rem;
            text-align: center;
        ">

            <a href="#"
               style="
                    color: var(--text-muted);
                    font-size: 0.82rem;
                    text-decoration: none;
                    transition: color 0.2s ease;
               "

               onmouseover="this.style.color='var(--primary-color)'"
               onmouseout="this.style.color='var(--text-muted)'"
            >
                ¿Olvidó su contraseña?
            </a>

        </div>

    </div>
</div>
