<section class="animate-fade-in" style="max-width: 900px; margin: 0 auto;">
    <div style="margin-bottom: 2.5rem; display: flex; align-items: center; gap: 1.5rem;">
        <button onclick="window.location.hash = '#inventario'" class="btn" style="background: var(--surface-color); color: white; border: 1px solid var(--border-color); padding: 0.6rem 1.2rem; border-radius: var(--border-radius-md); box-shadow: var(--shadow); font-weight: 600;">
            ← Volver al Inventario
        </button>
        <h1 style="margin: 0;">Ficha Técnica del Producto</h1>
    </div>

    <div id="product-detail-card" class="card" style="display: grid; grid-template-columns: 1.2fr 1.5fr; gap: 3rem; padding: 3rem; border-radius: var(--border-radius-lg); border: none; box-shadow: var(--shadow);">
        <div style="text-align: center;">
            <div id="detail-image-container" style="width: 100%; height: 350px; background: var(--bg-color); border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border-color); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);">
                <p style="color: var(--text-muted); font-weight: 500;">Cargando imagen...</p>
            </div>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 2rem;">
            <div>
                <h2 id="detail-nombre" style="font-size: 2.2rem; margin-bottom: 0.8rem; color: var(--text-main); line-height: 1.2;">---</h2>
                <span id="detail-estado" style="display: inline-block; padding: 6px 16px; border-radius: 30px; font-size: 0.85rem; color: white; font-weight: 700; background: var(--primary-color); box-shadow: 0 4px 10px rgba(34,197,94,0.3);">Estado</span>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; font-size: 1rem;">
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem;">Marca / Modelo</strong>
                    <span id="detail-marca-modelo" style="font-weight: 600; color: var(--text-main);">---</span>
                </div>
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem;">N° de Serie</strong>
                    <span id="detail-sn" style="font-family: 'Consolas', monospace; font-weight: 600; color: var(--text-main);">---</span>
                </div>
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem;">Color / Acabado</strong>
                    <span id="detail-color" style="font-weight: 600; color: var(--text-main);">---</span>
                </div>
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem;">Responsable</strong>
                    <span id="detail-responsable" style="font-weight: 600; color: var(--text-main);">---</span>
                </div>
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem;">Fecha de Registro</strong>
                    <span id="detail-fecha" style="font-weight: 600; color: var(--text-main);">---</span>
                </div>
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem;">Categoría de Activo</strong>
                    <span id="detail-tipo" style="text-transform: capitalize; font-weight: 600; color: var(--text-main);">---</span>
                </div>
            </div>
            
            <div style="margin-top: auto; padding: 1.5rem; border-radius: 14px; background: var(--bg-color); border: 1px solid var(--border-color);">
                <p style="font-size: 0.8rem; color: var(--text-muted); margin: 0;">
                    <strong style="color: var(--secondary-color); display: block; margin-bottom: 0.4rem;">ID ÚNICO DE SISTEMA</strong>
                    <span id="detail-id" style="font-family: 'Consolas', monospace; font-size: 0.85rem; color: var(--text-main); word-break: break-all;">---</span>
                </p>
            </div>
        </div>
    </div>
</section>
