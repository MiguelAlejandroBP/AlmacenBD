<section class="animate-fade-in" style="max-width: 800px; margin: 0 auto;">
    <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem;">
        <button onclick="window.location.hash = '#inventario'" class="btn" style="background: white; border: 1px solid var(--border-color);">← Volver</button>
        <h1>Ficha Técnica del Producto</h1>
    </div>

    <div id="product-detail-card" class="card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; padding: 2rem;">
        <div style="text-align: center;">
            <div id="detail-image-container" style="width: 100%; height: 300px; background: #f8fafc; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border-color);">
                <p>Cargando imagen...</p>
            </div>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div>
                <h2 id="detail-nombre" style="font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--primary-color);">---</h2>
                <span id="detail-estado" style="padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; color: white; font-weight: 600;">Estado</span>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; font-size: 0.95rem;">
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase;">Marca / Modelo</strong>
                    <span id="detail-marca-modelo">---</span>
                </div>
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase;">N° de Serie</strong>
                    <span id="detail-sn" style="font-family: monospace;">---</span>
                </div>
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase;">Color</strong>
                    <span id="detail-color">---</span>
                </div>
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase;">Responsable</strong>
                    <span id="detail-responsable">---</span>
                </div>
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase;">Fecha Registro</strong>
                    <span id="detail-fecha">---</span>
                </div>
                <div class="info-block">
                    <strong style="display: block; color: var(--secondary-color); font-size: 0.8rem; text-transform: uppercase;">Categoría</strong>
                    <span id="detail-tipo" style="text-transform: capitalize;">---</span>
                </div>
            </div>
            
            <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <p style="font-size: 0.8rem; color: var(--text-muted);">
                    ID Único de Sistema: <br>
                    <span id="detail-id" style="font-family: monospace; font-size: 0.75rem;">---</span>
                </p>
            </div>
        </div>
    </div>
</section>
